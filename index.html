<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        
        <style>
        html, body { 
            width: 100%; height: 100%; padding: 0; margin: 0; 
            background: #0d1117; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .hero-header {
            position: relative;
            width: 100%;
            height: 120px; 
            overflow: hidden;
            display: flex;
            align-items: center;
            border-bottom: 3px solid #d4a373;
        }

        .hero-header video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 1;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        .header-content {
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 30px;
        }

        .header-logo-left { position: absolute; left: 30px; height: 70px; width: auto; }
        .header-logo-right { position: absolute; right: 30px; height: 70px; width: auto; }

        .header-content h1 {
            color: #fff;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 32px;
            margin: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            letter-spacing: 1px;
            text-align: center;
        }

        /* --- MAP AREA --- */
        #map { flex-grow: 1; width: 100%; }

        /* --- 1. BUTTON MENU (IKUT GAMBAR - RAPAT KIRI) --- */
        .menu-btn {
            position: fixed;
            top: 150px; /* Jarak dari bawah header */
            left: 0;    /* RAPAT KIRI SEBIJIK DALAM GAMBAR */
            z-index: 1001; 
            background: #1b3022; /* Warna hijau gelap macam gambar */
            color: #fff; 
            padding: 15px 12px; 
            border: none;
            cursor: pointer;
            border-radius: 0 12px 12px 0; /* Bulat sikit sebelah kanan je */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .menu-btn i { font-size: 20px; }
        .menu-btn span { font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .menu-btn:hover { background: #2d4f39; transform: translateX(5px); }

        /* --- 2. ZOOM BUTTON AESTHETIC BULAT (BAWAH KANAN) --- */
        .leaflet-control-zoom { border: none !important; margin-right: 20px !important; margin-bottom: 50px !important; }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            background-color: #1b3022 !important; /* Hijau gelap */
            color: #d4a373 !important;
            border: 2px solid #d4a373 !important;
            border-radius: 50% !important; /* KASI BULAT */
            width: 40px !important;
            height: 40px !important;
            line-height: 36px !important;
            margin-bottom: 10px !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5) !important;
            font-size: 20px !important;
        }
        .leaflet-control-zoom-in:hover, .leaflet-control-zoom-out:hover { background: #d4a373 !important; color: #1b3022 !important; }

        /* --- 3. FOOTER HAK CIPTA (BAWAH SEKALI - NIPIS) --- */
        .custom-footer {
            width: 100%;
            background: #1b3022; /* Bar Hijau */
            color: #fff;
            text-align: center;
            padding: 8px 0; /* Nipis */
            font-size: 11px;
            font-family: Arial, sans-serif;
            letter-spacing: 0.5px;
            border-top: 1px solid #d4a373;
            z-index: 1002;
        }

        /* --- SIDEBAR & MODAL (SAMA MACAM KOD ASAL KAU) --- */
        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 2000;
            top: 0; left: 0; background: rgba(13, 17, 23, 0.98);
            backdrop-filter: blur(15px); overflow-x: hidden; 
            transition: 0.4s ease-in-out;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            font-family: 'Inter', sans-serif;
            border-right: 1px solid rgba(212, 163, 115, 0.2);
        }
        .sidebar-content { padding: 40px 25px; min-width: 280px; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 28px; cursor: pointer; color: #d4a373; border: none; background: none; }
        .sidebar h2 { color: #d4a373; font-size: 18px; font-weight: 700; margin-bottom: 30px; border-left: 4px solid #d4a373; padding-left: 15px; }
        .menu-section { background: rgba(255, 255, 255, 0.02); padding: 18px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .section-title { font-size: 9px; font-weight: 700; color: #8b949e; text-transform: uppercase; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #30363d; border-radius: 8px; background: #0d1117; color: #c9d1d9; outline: none; }
        .btn-primary { width: 100%; padding: 12px; background: #d4a373; color: #0d1117; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; }
        .btn-secondary { width: 100%; padding: 10px; background: transparent; color: #8b949e; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; }
        .btn-pdf { width: 100%; padding: 12px; background: transparent; color: #ffb366; border: 1px solid #ffb366; border-radius: 8px; cursor: pointer; font-weight: 800; margin-top: 15px; display: none; }
        .info-card { background: rgba(212, 163, 115, 0.03); padding: 14px; border-radius: 10px; margin-top: 10px; border-bottom: 1px solid rgba(212, 163, 115, 0.2); }
        .info-label { font-size: 8px; color: #8b949e; text-transform: uppercase; }
        .info-value { font-size: 14px; color: #f0f6fc; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #0d1117; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; border: 1px solid #d4a373; color: #fff; }
        </style>
        <title>Zedndrew | Smart Resident GIS</title>
    </head>
    <body>

        <header class="hero-header">
            <video autoplay muted loop playsinline>
                <source src="videogisreal.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
            <div class="header-content">
                <img src="logopolibulat.png" class="header-logo-left" alt="Logo Poli Kiri">
                <h1>saujana putra smart resident</h1>
                <img src="Logo_POUkuning.png" class="header-logo-right" alt="Logo Poli Kanan">
            </div>
        </header>

        <button class="menu-btn" onclick="openNav()">
            <i class="fas fa-bars"></i>
            <span>Menu</span>
        </button>

        <div id="mySidebar" class="sidebar">
            <div class="sidebar-content">
                <button class="close-btn" onclick="closeNav()">&times;</button>
                <h2>DASHBOARD</h2>
                <div class="menu-section">
                    <div class="section-title">Property Navigator</div>
                    <input type="text" id="lotSearch" class="search-box" placeholder="Insert Lot Number...">
                    <button class="btn-primary" onclick="searchLot()">Search</button>
                    <button class="btn-secondary" style="width:100%; margin-top:5px;" onclick="resetView()">Reset View</button>
                </div>
                <div class="menu-section">
                    <div class="section-title">Property Details</div>
                    <div class="info-card"><div class="info-label">TOTAL LOTS</div><div class="info-value">67</div></div>
                    <div class="info-card"><div class="info-label">IDENTIFICATION</div><div id="disp-lot" class="info-value">-</div></div>
                    <div class="info-card"><div class="info-label">LEGAL OWNER</div><div id="disp-owner" class="info-value">-</div></div>
                    <div class="info-card"><div class="info-label">COMPUTED AREA</div><div id="disp-area" class="info-value">-</div></div>
                    <button id="pdfBtn" class="btn-pdf" onclick="openPreview()">Generate Report</button>
                </div>
            </div>
        </div>

        <div id="map"></div>

        <footer class="custom-footer">
            All Rights Reserved 2026 © Zedndrew | Politeknik Ungku Omar
        </footer>

        <div id="modalOverlay" class="modal-overlay">
            <div class="modal-box">
                <h3 style="color:#d4a373">Report Confirmation</h3>
                <div style="margin: 20px 0;">
                    <label style="font-size:10px; color:#8b949e">PREPARED BY</label>
                    <input type="text" id="userName" class="search-box" placeholder="Enter name...">
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-primary" onclick="confirmDownload()">DOWNLOAD</button>
                    <button class="btn-secondary" onclick="closePreview()">CANCEL</button>
                </div>
            </div>
        </div>

        <script src="js/leaflet.js"></script>
        <script src="data/lotfinal_1.js"></script>
        <script src="data/TANDASEMPADANLOTGABUNG_2.js"></script>

        <script>
        var currentLotData = null;
        function openNav() { document.getElementById("mySidebar").style.width = "320px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
        function openPreview() { if(!currentLotData) return; document.getElementById('modalOverlay').style.display = 'flex'; }
        function closePreview() { document.getElementById('modalOverlay').style.display = 'none'; }
        function confirmDownload() { generatePDF(); closePreview(); }

        var map = L.map('map', { zoomControl: true, maxZoom: 28, minZoom: 1 }).fitBounds([[2.1024, 102.5206], [2.1047, 102.5246]]);
        map.zoomControl.setPosition('bottomright');

        L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 28, crossOrigin: 'Anonymous' }).addTo(map);

        function updateDashboard(props) {
            currentLotData = props;
            document.getElementById('disp-lot').innerText = props.NO_LOT || '-';
            document.getElementById('disp-owner').innerText = props["tsp — pemilik_PEMILIK"] || "N/A";
            document.getElementById('disp-area').innerHTML = (props.AREA || '-') + ' m2';
            document.getElementById('pdfBtn').style.display = 'block';
            openNav();
        }

        var layer_lotfinal_1 = new L.geoJson(json_lotfinal_1, {
            style: { opacity: 1, color: '#d4a373', weight: 1, fillOpacity: 0.2, fillColor: '#d4a373' },
            onEachFeature: function(feature, layer) {
                layer.on('click', function(e) {
                    layer_lotfinal_1.setStyle({ opacity: 1, color: '#d4a373', weight: 1, fillOpacity: 0.2 });
                    layer.setStyle({ color: '#fff', weight: 3, fillOpacity: 0.6 });
                    updateDashboard(feature.properties);
                    L.DomEvent.stopPropagation(e);
                });
            }
        }).addTo(map);

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("LOT REPORT: " + (currentLotData.NO_LOT), 20, 20);
            doc.save("Report_Lot_" + currentLotData.NO_LOT + ".pdf");
        }

        function searchLot() {
            var val = document.getElementById('lotSearch').value;
            layer_lotfinal_1.eachLayer(function(l) {
                if (String(l.feature.properties.NO_LOT) === val) {
                    l.fire('click');
                    map.fitBounds(l.getBounds());
                }
            });
        }
        function resetView() { location.reload(); }
        </script>
    </body>
</html>
