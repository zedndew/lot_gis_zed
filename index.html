<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        /* --- CSS UNTUK SIDEBAR --- */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: white;
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
            font-family: Arial, sans-serif;
        }
        .sidebar-content {
            padding: 20px;
        }
        .sidebar h2 { color: #333; }
        .menu-btn {
            position: fixed;
            top: 10px;
            left: 50px; /* Sebelah butang zoom */
            z-index: 1001;
            background: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border-radius: 4px;
            font-weight: bold;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 25px;
            cursor: pointer;
            border: none;
            background: none;
        }
        .search-box {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .layer-toggle {
            margin-top: 20px;
            display: block;
            padding: 10px;
            background: #f4f4f4;
            border-radius: 5px;
            cursor: pointer;
        }
        </style>
        <title>Map Interactive</title>
    </head>
    <body>

        <button class="menu-btn" onclick="openNav()">☰ MENU</button>

        <div id="mySidebar" class="sidebar">
            <button class="close-btn" onclick="closeNav()">×</button>
            <div class="sidebar-content">
                <h2>Carian Lot</h2>
                <input type="text" id="lotSearch" class="search-box" placeholder="Masukkan No Lot...">
                <button onclick="searchLot()" style="width:100%; padding:8px; cursor:pointer;">Cari</button>

                <hr>
                <h2>Tetapan Peta</h2>
                <label class="layer-toggle">
                    <input type="radio" name="basemap" onclick="switchMap('osm')" checked> Peta Biasa
                </label>
                <label class="layer-toggle">
                    <input type="radio" name="basemap" onclick="switchMap('satelit')"> Peta Satelit
                </label>
            </div>
        </div>

        <div id="map"></div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="data/LOTGABUNGREAL_0.js"></script>
        <script src="data/lotfinal_1.js"></script>
        <script src="data/TANDASEMPADANLOTGABUNG_2.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;
            highlightLayer.openPopup();
        }

        /* --- FUNGSI SIDEBAR --- */
        function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[2.1024896462129306,102.52064420999763],[2.104750631291431,102.52466260867483]]);
        
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        // Setup Layers
        var layer_OSM = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {opacity: 1.0});
        var layer_GoogleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {opacity: 1.0});
        
        map.addLayer(layer_OSM); // Default

        /* --- FUNGSI TUKAR MAP --- */
        function switchMap(type) {
            if (type === 'satelit') {
                map.addLayer(layer_GoogleSatellite);
                map.removeLayer(layer_OSM);
            } else {
                map.addLayer(layer_OSM);
                map.removeLayer(layer_GoogleSatellite);
            }
        }

        /* --- FUNGSI CARI LOT --- */
        function searchLot() {
            var value = document.getElementById('lotSearch').value;
            var found = false;
            layer_LOTGABUNGREAL_0.eachLayer(function(layer) {
                if (layer.feature.properties.NO_LOT == value) {
                    map.fitBounds(layer.getBounds());
                    layer.openPopup();
                    found = true;
                }
            });
            if (!found) alert("No Lot tidak dijumpai!");
        }

        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

		function addClassToPopupIfMedia(content, popup) {
			var tempDiv = document.createElement('div');
			tempDiv.innerHTML = content;
			if (tempDiv.querySelector('td img')) {
				popup._contentNode.classList.add('media');
					setTimeout(function() {
						popup.update();
					}, 10);
			} else {
				popup._contentNode.classList.remove('media');
			}
		}

        var zoomControl = L.control.zoom({ position: 'topleft' }).addTo(map);
        var bounds_group = new L.featureGroup([]);

        function pop_LOTGABUNGREAL_0(feature, layer) {
            layer.on({
                mouseout: function(e) { layer.closePopup(); },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr><td colspan="2">LOT: ' + (feature.properties['NO_LOT'] !== null ? feature.properties['NO_LOT'] : '') + '</td></tr>\
                    <tr><td colspan="2">AREA: ' + (feature.properties['AREA'] !== null ? feature.properties['AREA'] : '') + '</td></tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_LOTGABUNGREAL_0_0() {
            return {
                pane: 'pane_LOTGABUNGREAL_0',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                weight: 1.0, 
                fill: true,
                fillOpacity: 0.6,
                fillColor: 'rgba(231,113,72,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_LOTGABUNGREAL_0');
        map.getPane('pane_LOTGABUNGREAL_0').style.zIndex = 400;
        var layer_LOTGABUNGREAL_0 = new L.geoJson(json_LOTGABUNGREAL_0, {
            onEachFeature: pop_LOTGABUNGREAL_0,
            style: style_LOTGABUNGREAL_0_0,
        });
        bounds_group.addLayer(layer_LOTGABUNGREAL_0);
        map.addLayer(layer_LOTGABUNGREAL_0);

        // --- LOT FINAL & SEMPADAN (Kekalkan kod asal) ---
        map.createPane('pane_lotfinal_1');
        map.getPane('pane_lotfinal_1').style.zIndex = 401;
        var layer_lotfinal_1 = new L.geoJson(json_lotfinal_1, {
            pane: 'pane_lotfinal_1',
            style: style_LOTGABUNGREAL_0_0,
        });
        map.addLayer(layer_lotfinal_1);

        map.createPane('pane_TANDASEMPADANLOTGABUNG_2');
        map.getPane('pane_TANDASEMPADANLOTGABUNG_2').style.zIndex = 402;
        var layer_TANDASEMPADANLOTGABUNG_2 = new L.geoJson(json_TANDASEMPADANLOTGABUNG_2, {
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, {radius: 4, fillColor: 'rgba(190,207,80,1.0)', color: '#000', weight: 1, fillOpacity: 1});
            },
        });
        map.addLayer(layer_TANDASEMPADANLOTGABUNG_2);

        </script>
    </body>
</html>
