<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        
        <style>
        html, body { 
            width: 100%; height: 100%; padding: 0; margin: 0; 
            background: #0d1117; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER DENGAN VIDEO --- */
        .hero-header {
            position: relative;
            width: 100%;
            height: 120px; 
            overflow: hidden;
            display: flex;
            align-items: center;
            border-bottom: 3px solid #d4a373;
        }

        .hero-header video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 1;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        .header-content {
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 30px;
        }

        .header-logo-left { position: absolute; left: 30px; height: 70px; width: auto; }
        .header-logo-right { position: absolute; right: 30px; height: 70px; width: auto; }

        .header-content h1 {
            color: #fff;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 32px;
            margin: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            letter-spacing: 1px;
            text-align: center;
        }

        #map { flex-grow: 1; width: 100%; }

        /* --- DASHBOARD DARK ELITE --- */
        .sidebar {
            height: 100%; width: 0; position: fixed; 
            z-index: 4000; /* DITINGKATKAN SUPAYA DI ATAS FOOTER */
            top: 0; left: 0; background: rgba(13, 17, 23, 0.98);
            backdrop-filter: blur(15px); overflow-x: hidden; 
            transition: 0.4s ease-in-out;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            font-family: 'Inter', sans-serif;
            border-right: 1px solid rgba(212, 163, 115, 0.2);
        }

        .sidebar-content { padding: 40px 25px; min-width: 280px; position: relative; }

        .close-btn { 
            position: absolute; top: 20px; right: 20px;
            font-size: 28px; cursor: pointer; color: #d4a373; 
            border: none; background: none; transition: 0.3s;
        }
        .close-btn:hover { color: #fff; transform: rotate(90deg); }

        .sidebar h2 { 
            color: #d4a373; font-size: 18px; font-weight: 700;
            letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase;
            border-left: 4px solid #d4a373; padding-left: 15px;
        }

        .menu-section {
            background: rgba(255, 255, 255, 0.02); padding: 18px;
            border-radius: 12px; margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section-title { font-size: 9px; font-weight: 700; color: #8b949e; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1.5px; }

        .search-box {
            width: 100%; padding: 12px; margin-bottom: 12px;
            border: 1px solid #30363d; border-radius: 8px;
            background: #0d1117; color: #c9d1d9; box-sizing: border-box; outline: none;
        }

        .btn-primary { 
            width: 100%; padding: 12px; background: #d4a373; color: #0d1117; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: 800; 
            margin-bottom: 8px; text-transform: uppercase; transition: 0.3s;
        }
        .btn-primary:hover { background: #faedcd; }

        .btn-secondary { width: 100%; padding: 10px; background: transparent; color: #8b949e; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; font-size: 11px; }

        .btn-pdf {
            width: 100%; padding: 12px; background: transparent; color: #ffb366;
            border: 1px solid #ffb366; border-radius: 8px; cursor: pointer;
            font-weight: 800; font-size: 11px; text-transform: uppercase;
            margin-top: 15px; transition: 0.3s; display: none;
        }
        .btn-pdf:hover { background: rgba(255, 179, 102, 0.1); }

        .info-card {
            background: rgba(212, 163, 115, 0.03); padding: 14px; border-radius: 10px;
            margin-top: 10px; border-bottom: 1px solid rgba(212, 163, 115, 0.2);
        }
        .info-label { font-size: 8px; color: #8b949e; font-weight: 600; text-transform: uppercase; }
        .info-value { font-size: 14px; font-weight: 500; color: #f0f6fc; margin-top: 4px; }

        /* --- MENU BUTTON BUBBLE STYLE & RAPAT KIRI --- */
        .menu-btn {
            position: fixed; 
            top: 140px; 
            left: 0 !important;
            z-index: 1001; 
            background: #0d1117; 
            color: #d4a373; 
            padding: 15px 25px 15px 15px; 
            border: 2px solid #d4a373; 
            border-left: none !important; 
            cursor: pointer; 
            border-radius: 0 50px 50px 0 !important; 
            font-size: 12px; 
            font-weight: 900; 
            letter-spacing: 2px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-btn:hover {
            padding-left: 25px;
            background: #d4a373;
            color: #0d1117;
            box-shadow: 0 0 20px rgba(212, 163, 115, 0.4);
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 5000; display: none; align-items: center; justify-content: center;
        }
        .modal-box {
            background: #0d1117; width: 90%; max-width: 400px;
            padding: 30px; border-radius: 20px; border: 1px solid #d4a373;
            box-shadow: 0 20px 50px rgba(0,0,0,1); color: #fff;
        }
        .modal-box h3 { color: #d4a373; margin-top: 0; font-size: 16px; text-transform: uppercase; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .modal-body { margin: 20px 0; font-size: 13px; }
        .modal-body label { display: block; margin-bottom: 8px; color: #8b949e; font-size: 10px; font-weight: 700; }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
        
        .btn-confirm { flex: 1; padding: 12px; background: #d4a373; color: #0d1117; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .btn-cancel { flex: 1; padding: 12px; background: transparent; border: 1px solid #30363d; color: #8b949e; border-radius: 8px; font-weight: 800; cursor: pointer; }

        .leaflet-bottom.leaflet-right { margin-bottom: 30px; margin-right: 20px; }

        /* --- ZOOM CONTROLS --- */
        .leaflet-control-zoom { border: none !important; box-shadow: 0 8px 25px rgba(0,0,0,0.6) !important; }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            background-color: #0d1117 !important;
            color: #d4a373 !important;
            border: 1px solid rgba(212, 163, 115, 0.4) !important;
            font-family: 'Inter', sans-serif;
            font-weight: bold !important;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            width: 40px !important; height: 40px !important; line-height: 40px !important; font-size: 18px !important;
        }
        .leaflet-bar a:first-child { border-top-left-radius: 12px !important; border-top-right-radius: 12px !important; }
        .leaflet-bar a:last-child { border-bottom-left-radius: 12px !important; border-bottom-right-radius: 12px !important; border-top: none !important; }
        .leaflet-control-zoom-in:hover, .leaflet-control-zoom-out:hover { background-color: #d4a373 !important; color: #0d1117 !important; transform: scale(1.1); z-index: 10; }
        .leaflet-control-attribution { background: rgba(13, 17, 23, 0.7) !important; color: #8b949e !important; font-size: 9px !important; backdrop-filter: blur(5px); border-radius: 10px 0 0 0; }
        .leaflet-control-attribution a { color: #d4a373 !important; }

        /* --- FOOTER CSS --- */
        .aesthetic-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25px;
            background: rgba(13, 17, 23, 0.9);
            border-top: 1px solid rgba(212, 163, 115, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2500; /* LEBIH RENDAH DARI SIDEBAR */
            backdrop-filter: blur(5px);
        }
        .footer-text {
            color: #d4a373;
            font-family: 'Inter', sans-serif;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }
        </style>
        <title>Zedndrew | Smart Resident GIS</title>
    </head>
    <body>

        <header class="hero-header">
            <video autoplay muted loop playsinline>
                <source src="videogisreal.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
            <div class="header-content">
                <img src="logopolibulat.png" class="header-logo-left" alt="Logo Poli Kiri">
                <h1>saujana putra smart resident</h1>
                <img src="Logo_POUkuning.png" class="header-logo-right" alt="Logo Poli Kanan">
            </div>
        </header>

        <button class="menu-btn" onclick="openNav()"><i class="fas fa-bars"></i> MENU</button>

        <div id="mySidebar" class="sidebar">
            <div class="sidebar-content">
                <button class="close-btn" onclick="closeNav()">&times;</button>
                <h2>DASHBOARD</h2>
                <div class="menu-section">
                    <div class="section-title">Property Navigator</div>
                    <input type="text" id="lotSearch" class="search-box" placeholder="Insert Lot Number...">
                    <button class="btn-primary" onclick="searchLot()">Search</button>
                    <button class="btn-secondary" style="width:100%" onclick="resetView()">Reset View</button>
                </div>
                <div class="menu-section">
                    <div class="section-title">Property Details</div>
                    <div class="info-card"><div class="info-label">TOTAL LOTS IN AREA</div><div class="info-value">67</div></div>
                    <div class="info-card"><div class="info-label">IDENTIFICATION</div><div id="disp-lot" class="info-value">-</div></div>
                    <div class="info-card"><div class="info-label">LEGAL OWNER</div><div id="disp-owner" class="info-value">-</div></div>
                    <div class="info-card"><div class="info-label">COMPUTED AREA</div><div id="disp-area" class="info-value">-</div></div>
                    <button id="pdfBtn" class="btn-pdf" onclick="openPreview()">Generate Report</button>
                </div>
                <div style="font-size: 9px; text-align: center; color: #484f58; margin-top: 40px; letter-spacing: 1px;">ZEDNDREW EXPLORER &copy; 2026</div>
            </div>
        </div>

        <div id="modalOverlay" class="modal-overlay">
            <div class="modal-box">
                <h3>Report Confirmation</h3>
                <div class="modal-body">
                    <label>PREPARED BY (REQUIRED)</label>
                    <input type="text" id="userName" class="search-box" placeholder="Enter your name..." style="margin-bottom: 20px;">
                    <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px;">
                        <div style="margin-bottom: 8px;"><b>LOT:</b> <span id="pre-lot"></span></div>
                        <div style="margin-bottom: 8px;"><b>OWNER:</b> <span id="pre-owner"></span></div>
                        <div><b>AREA:</b> <span id="pre-area"></span></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-cancel" onclick="closePreview()">CANCEL</button>
                    <button class="btn-confirm" onclick="confirmDownload()">DOWNLOAD PDF</button>
                </div>
            </div>
        </div>

        <div class="aesthetic-footer">
            <div class="footer-text">All Rights Reserved 2026 &copy; Zedndrew | Politeknik Ungku Omar</div>
        </div>

        <div id="map"></div>

        <script src="js/leaflet.js"></script>
        <script src="data/lotfinal_1.js"></script>
        <script src="data/TANDASEMPADANLOTGABUNG_2.js"></script>

        <script>
        var currentLotData = null;
        function openNav() { document.getElementById("mySidebar").style.width = "320px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
        function openPreview() {
            if(!currentLotData) return;
            document.getElementById('pre-lot').innerText = currentLotData.NO_LOT;
            document.getElementById('pre-owner').innerText = currentLotData["tsp — pemilik_PEMILIK"] || "N/A";
            document.getElementById('pre-area').innerText = currentLotData.AREA + " m2";
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function closePreview() { document.getElementById('modalOverlay').style.display = 'none'; }
        function confirmDownload() { generatePDF(); closePreview(); }

        var map = L.map('map', { zoomControl: true, maxZoom: 28, minZoom: 1, preferCanvas: true }).fitBounds([[2.1024, 102.5206], [2.1047, 102.5246]]);
        map.zoomControl.setPosition('bottomright');

        var layer_GoogleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxNativeZoom: 20, maxZoom: 28, crossOrigin: 'Anonymous' }).addTo(map);

        function updateDashboard(props) {
            currentLotData = props;
            document.getElementById('disp-lot').innerText = props.NO_LOT || '-';
            document.getElementById('disp-owner').innerText = props["tsp — pemilik_PEMILIK"] || "N/A";
            document.getElementById('disp-area').innerHTML = (props.AREA || '-') + ' m<sup>2</sup>';
            document.getElementById('pdfBtn').style.display = 'block';
            openNav();
        }

        var defaultStyle = { opacity: 1, color: '#d4a373', weight: 1, fill: true, fillOpacity: 0.2, fillColor: '#d4a373' };
        var highlightStyle = { opacity: 1, color: '#fff', weight: 3, fill: true, fillOpacity: 0.6, fillColor: '#d4a373' };
        var lastClickedLayer;

        var layer_lotfinal_1 = new L.geoJson(json_lotfinal_1, {
            style: defaultStyle,
            onEachFeature: function(feature, layer) {
                layer.on({
                    click: function(e) {
                        if (lastClickedLayer) { layer_lotfinal_1.resetStyle(lastClickedLayer); }
                        layer.setStyle(highlightStyle);
                        lastClickedLayer = layer;
                        updateDashboard(feature.properties);
                        L.DomEvent.stopPropagation(e);
                    }
                });
            }
        }).addTo(map);

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const user = (document.getElementById('userName').value || "AUTHORIZED USER").toUpperCase();
            const logoUrl = 'https://upload.wikimedia.org/wikipedia/commons/b/be/Logo_Politeknik_Malaysia.png';
            const mapContainer = document.getElementById('map');
            const canvas = await html2canvas(mapContainer, { useCORS: true, logging: false, height: mapContainer.offsetHeight, width: mapContainer.offsetWidth });
            const mapImgData = canvas.toDataURL('image/png');
            doc.setFillColor(13, 17, 23); doc.rect(0, 0, 210, 50, 'F');
            doc.setDrawColor(212, 163, 115); doc.setLineWidth(1.5); doc.line(0, 50, 210, 50);
            try { doc.addImage(logoUrl, 'PNG', 15, 10, 30, 25); } catch (e) { console.error("Logo Error"); }
            doc.setTextColor(212, 163, 115); doc.setFont("helvetica", "bold"); doc.setFontSize(20); doc.text("PROPERTY INFORMATION REPORT", 50, 25);
            doc.setFontSize(9); doc.setTextColor(150, 150, 150); doc.setFont("helvetica", "normal"); doc.text("POLITEKNIK MALAYSIA | GEOGRAPHIC INFORMATION SYSTEM", 50, 32);
            doc.text("ZEDNDREW EXPLORER OFFICIAL DATA RECORD", 50, 37);
            doc.setTextColor(40, 40, 40); doc.setFontSize(11); doc.setFont("helvetica", "bold"); doc.text("LOT VISUALIZATION:", 20, 65);
            doc.setDrawColor(212, 163, 115); doc.setLineWidth(0.5); doc.addImage(mapImgData, 'PNG', 20, 70, 170, 85); doc.rect(20, 70, 170, 85, 'S');
            doc.setFillColor(248, 249, 250); doc.rect(20, 165, 170, 85, 'F');
            doc.setDrawColor(220, 220, 220); doc.rect(20, 165, 170, 85, 'S');
            doc.setTextColor(40, 40, 40); doc.setFontSize(12); doc.setFont("helvetica", "bold"); doc.text("OFFICIAL PROPERTY DATA:", 30, 178);
            let yPos = 190;
            const items = [ ["LOT NUMBER", ": " + (currentLotData.NO_LOT || "-")], ["PA NUMBER", ": " + (currentLotData["tsp — hakmilik_NO_PA"] || "N/A")], ["LEGAL OWNER", ": " + (currentLotData["tsp — pemilik_PEMILIK"] || "N/A")], ["TOTAL AREA", ": " + (currentLotData.AREA || "-") + " m2"], ["DISTRICT", ": " + (currentLotData["tsp — hakmilik_DAERAH"] || "TANGKAK")], ["LAND USE", ": " + (currentLotData["tsp — hakmilik_KEGUNAAN_TANAH"] || "-")] ];
            items.forEach(item => { doc.setFont("helvetica", "bold"); doc.setFontSize(10); doc.text(item[0], 35, yPos); doc.setFont("helvetica", "normal"); doc.text(item[1], 80, yPos); yPos += 9; });
            doc.setFontSize(9); doc.setTextColor(100, 100, 100); doc.text("Prepared By: " + user, 20, 265); doc.text("Generated on: " + new Date().toLocaleString(), 20, 270);
            doc.setFontSize(8); doc.setTextColor(180, 180, 180); doc.text("CONFIDENTIAL - ZEDNDREW EXPLORER V4", 140, 285);
            doc.save("Report_Lot_" + (currentLotData.NO_LOT || "Unknown") + ".pdf");
        }

        function searchLot() {
            var value = document.getElementById('lotSearch').value.trim();
            var found = false;
            layer_lotfinal_1.eachLayer(function(layer) {
                if (String(layer.feature.properties.NO_LOT) === value) {
                    if (lastClickedLayer) { layer_lotfinal_1.resetStyle(lastClickedLayer); }
                    layer.setStyle(highlightStyle); lastClickedLayer = layer;
                    updateDashboard(layer.feature.properties); map.fitBounds(layer.getBounds(), {padding: [100, 100]}); found = true;
                }
            });
            if (!found) alert("Lot " + value + " not found.");
        }
        function resetView() { location.reload(); }
        if (typeof json_TANDASEMPADANLOTGABUNG_2 !== 'undefined') {
            L.geoJson(json_TANDASEMPADANLOTGABUNG_2, { pointToLayer: function (f, latlng) { return L.circleMarker(latlng, {radius: 2, fillColor: '#d4a373', color: '#0d1117', weight: 1, fillOpacity: 1}); } }).addTo(map);
        }
        </script>
    </body>
</html>
