<html lang="en">

        html, body, #map {

        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>

        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;
            highlightLayer.openPopup();
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[2.1024896462129306,102.52064420999763],[2.104750631291431,102.52466260867483]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // add class to format popup if it contains media
		function addClassToPopupIfMedia(content, popup) {
			var tempDiv = document.createElement('div');
			tempDiv.innerHTML = content;
			if (tempDiv.querySelector('td img')) {
				popup._contentNode.classList.add('media');
					// Delay to force the redraw
					setTimeout(function() {
						popup.update();
					}, 10);
			} else {
				popup._contentNode.classList.remove('media');
			}
		}
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        function pop_LOTGABUNGREAL_0(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['AREA'] !== null ? autolinker.link(String(feature.properties['AREA']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['NO_LOT'] !== null ? autolinker.link(String(feature.properties['NO_LOT']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['layer'] !== null ? autolinker.link(String(feature.properties['layer']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['path'] !== null ? autolinker.link(String(feature.properties['path']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_LOTGABUNGREAL_0_0() {
            return {
                pane: 'pane_LOTGABUNGREAL_0',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(231,113,72,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_LOTGABUNGREAL_0');
        map.getPane('pane_LOTGABUNGREAL_0').style.zIndex = 400;
        map.getPane('pane_LOTGABUNGREAL_0').style['mix-blend-mode'] = 'normal';
        var layer_LOTGABUNGREAL_0 = new L.geoJson(json_LOTGABUNGREAL_0, {
            attribution: '',
            interactive: true,
            dataVar: 'json_LOTGABUNGREAL_0',
            layerName: 'layer_LOTGABUNGREAL_0',
            pane: 'pane_LOTGABUNGREAL_0',
            onEachFeature: pop_LOTGABUNGREAL_0,
            style: style_LOTGABUNGREAL_0_0,
        });
        bounds_group.addLayer(layer_LOTGABUNGREAL_0);
        map.addLayer(layer_LOTGABUNGREAL_0);

                    if (typeof layer.closePopup == 'function') {

            var popupContent = '<table>\

                    </tr>\
                    <tr>\
                        <td class="visible-with-data" id="NO_LOT" colspan="2"><strong>NO_LOT</strong><br />' + (feature.properties['NO_LOT'] !== null ? autolinker.link(String(feature.properties['NO_LOT']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\

                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['path'] !== null ? autolinker.link(String(feature.properties['path']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['tsp — hakmilik_DAERAH'] !== null ? autolinker.link(String(feature.properties['tsp — hakmilik_DAERAH']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\

                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_lotfinal_1_0() {
            return {
                pane: 'pane_lotfinal_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,

        }
        map.createPane('pane_lotfinal_1');
        map.getPane('pane_lotfinal_1').style.zIndex = 401;
        map.getPane('pane_lotfinal_1').style['mix-blend-mode'] = 'normal';
        var layer_lotfinal_1 = new L.geoJson(json_lotfinal_1, {
            attribution: '',

            dataVar: 'json_lotfinal_1',
            layerName: 'layer_lotfinal_1',
            pane: 'pane_lotfinal_1',

        });
        bounds_group.addLayer(layer_lotfinal_1);
        map.addLayer(layer_lotfinal_1);

            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {

			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_TANDASEMPADANLOTGABUNG_2_0() {
            return {
                pane: 'pane_TANDASEMPADANLOTGABUNG_2',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(190,207,80,1.0)',

            }
        }
        map.createPane('pane_TANDASEMPADANLOTGABUNG_2');
        map.getPane('pane_TANDASEMPADANLOTGABUNG_2').style.zIndex = 402;
        map.getPane('pane_TANDASEMPADANLOTGABUNG_2').style['mix-blend-mode'] = 'normal';
        var layer_TANDASEMPADANLOTGABUNG_2 = new L.geoJson(json_TANDASEMPADANLOTGABUNG_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_TANDASEMPADANLOTGABUNG_2',
            layerName: 'layer_TANDASEMPADANLOTGABUNG_2',
            pane: 'pane_TANDASEMPADANLOTGABUNG_2',
            onEachFeature: pop_TANDASEMPADANLOTGABUNG_2,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_TANDASEMPADANLOTGABUNG_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_TANDASEMPADANLOTGABUNG_2);
        map.addLayer(layer_TANDASEMPADANLOTGABUNG_2);
        setBounds();
        </script>
